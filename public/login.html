<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Login — ScreenGrid</title>
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link rel="stylesheet" href="/css/main.css">
  <style>
  @media (max-width: 480px) { .card { margin: 16px; padding: 24px; } .grid-2 { grid-template-columns: 1fr !important; } }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-wrap {
      width: 100%;
      max-width: 460px;
      padding: 20px;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px 44px;
      box-shadow: var(--shadow-card);
    }
    .auth-logo {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-logo span { color: var(--blue); }
    .auth-subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }
    .form { display: flex; flex-direction: column; gap: 20px; }
    .bg-art {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 30% 70%, rgba(45,107,228,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(79,158,255,0.05) 0%, transparent 60%),
        var(--bg-base);
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="bg-art"></div>
  <div class="auth-wrap">
    <div style="text-align:center;margin-bottom:24px">
      <a href="/" style="font-family:var(--font-display);font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--text-primary)">
        <span style="white-space:nowrap"><span style="color:var(--text-primary)">Screen</span><span style="color:var(--blue)">Grid</span></span>
      </a>
    </div>
    <div class="auth-card">
      <div class="auth-logo">Welcome <span>Back</span></div>
      <div class="auth-subtitle">Sign in to your advertising dashboard</div>
      <div id="error-msg" class="alert alert-danger" style="display:none;margin-bottom:16px"></div>
      <form class="form" onsubmit="login(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@business.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="login-btn">
          Sign In
        </button>
      </form>
      <div class="divider"></div>
      <p style="text-align:center;font-size:14px;color:var(--text-muted)">
        Don't have an account? <a href="/signup.html" style="color:var(--accent)">Create one →</a>
      </p>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--text-faint);margin-top:24px">
      Admin? Use your admin credentials to access the <a href="/admin.html">admin portal</a>.
    </p>
  </div>
  <script>
    async function login(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('vkw_token', data.token);
        localStorage.setItem('vkw_user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? '/admin.html' : '/dashboard.html';
      } catch(err) {
        errEl.textContent = err.message;
        errEl.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
    // Already logged in?
    if (localStorage.getItem('vkw_token')) {
      const u = JSON.parse(localStorage.getItem('vkw_user') || '{}');
      window.location.href = u.role === 'admin' ? '/admin.html' : '/dashboard.html';
    }
  </script>
<script src="/js/db-status.js"></script>
</body>
</html>
